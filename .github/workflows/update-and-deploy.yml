name: Update seasonal forecast and deploy Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "5 6 * * *"
  workflow_dispatch:
    inputs:
      refresh:
        description: Check JMA seasonal forecast sources before deployment
        required: true
        default: true
        type: boolean
      deploy:
        description: Deploy the verified source commit to GitHub Pages
        required: true
        default: true
        type: boolean

permissions: {}

concurrency:
  group: climate-outlook-navi-production
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    outputs:
      changed: ${{ steps.state.outputs.changed }}
      should_deploy: ${{ steps.state.outputs.should_deploy }}
      source_sha: ${{ steps.state.outputs.source_sha }}
    steps:
      - name: Check out main with complete history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements-ci.txt

      - name: Install verification dependencies
        run: python -m pip install --requirement scripts/requirements-ci.txt

      - name: Refresh validated seasonal forecast derivative
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.refresh)
        run: python scripts/update_season_forecast.py

      - name: Verify candidate before commit
        env:
          PRIVACY_DENYLIST: ${{ secrets.PRIVACY_DENYLIST }}
        run: |
          python scripts/verify_contract.py
          python scripts/privacy_gate.py
          git diff --check

      - name: Commit changed seasonal data locally
        id: state
        env:
          EVENT_NAME: ${{ github.event_name }}
          REPOSITORY_VISIBILITY: ${{ github.event.repository.visibility }}
          MANUAL_DEPLOY: ${{ inputs.deploy }}
        run: |
          changed=false
          if test -n "$(git status --porcelain --untracked-files=all -- data/season)"; then
            unexpected="$(git status --porcelain --untracked-files=all | sed -E 's/^.. //' | grep -v '^data/season/' || true)"
            test -z "$unexpected" || { echo "Updater changed files outside data/season"; exit 1; }
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -- data/season
            git diff --cached --check
            git commit -m "Update seasonal forecast data"
            changed=true
          fi
          source_sha="$(git rev-parse HEAD)"
          should_deploy=false
          if test "$REPOSITORY_VISIBILITY" = "public"; then
            if test "$EVENT_NAME" = "push" || test "$changed" = "true" || test "$MANUAL_DEPLOY" = "true"; then
              should_deploy=true
            fi
          fi
          echo "changed=$changed" >> "$GITHUB_OUTPUT"
          echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"
          echo "should_deploy=$should_deploy" >> "$GITHUB_OUTPUT"

      - name: Recheck committed reachable history
        if: steps.state.outputs.changed == 'true'
        env:
          PRIVACY_DENYLIST: ${{ secrets.PRIVACY_DENYLIST }}
        run: python scripts/privacy_gate.py

      - name: Push exact verified seasonal update
        if: steps.state.outputs.changed == 'true'
        run: git push origin HEAD:main

  build:
    if: needs.prepare.outputs.should_deploy == 'true'
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      source_sha: ${{ needs.prepare.outputs.source_sha }}
    steps:
      - name: Check out the exact source commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements-ci.txt

      - name: Install verification dependencies
        run: python -m pip install --requirement scripts/requirements-ci.txt

      - name: Verify source and build allowlisted Pages payload
        env:
          PRIVACY_DENYLIST: ${{ secrets.PRIVACY_DENYLIST }}
          SOURCE_COMMIT: ${{ needs.prepare.outputs.source_sha }}
        run: |
          python scripts/privacy_gate.py
          python scripts/verify_contract.py
          python scripts/build_pages_payload.py
          python scripts/verify_contract.py --site-root _site
          python scripts/privacy_gate.py --root _site --skip-history

      - name: Upload verified Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: _site
          retention-days: 1

  deploy:
    if: needs.build.result == 'success'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Deploy exact verified artifact
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

  verify-public:
    if: needs.deploy.result == 'success'
    needs: [build, deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Check out public verifier
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.build.outputs.source_sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Install HTTPS verification dependency
        run: python -m pip install certifi==2025.8.3

      - name: Verify every deployed file and source commit
        run: |
          python scripts/verify_deployed_pages.py \
            --base-url "${{ needs.deploy.outputs.page_url }}" \
            --source-commit "${{ needs.build.outputs.source_sha }}"
