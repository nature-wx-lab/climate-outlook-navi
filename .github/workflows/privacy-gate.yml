name: Privacy gate

on:
  push:
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  privacy:
    runs-on: ubuntu-latest
    # Full-history scanning now covers every cataloged climate binary and raster.
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Check out complete reachable history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements-ci.txt

      - name: Install verification dependencies
        run: python -m pip install --requirement scripts/requirements-ci.txt

      - name: Verify current files and complete reachable history
        env:
          PRIVACY_DENYLIST: ${{ secrets.PRIVACY_DENYLIST }}
        run: |
          python scripts/privacy_gate.py
          python scripts/verify_contract.py
          git diff --check
